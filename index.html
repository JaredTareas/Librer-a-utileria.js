<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Validaciones</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

    <div class="contenedor">
        <h1>Formulario de Registro</h1>
        <p>Ejemplo usando la librería de validaciones en JavaScript.</p>

        <form id="formulario" novalidate>
            <label for="nombre">Nombre:</label>
            <input type="text" id="nombre" placeholder="Ejemplo: Jared">

            <label for="apellido">Apellido:</label>
            <input type="text" id="apellido" placeholder="Ejemplo: García">

            <label for="correo">Correo electrónico:</label>
            <input type="text" id="correo" placeholder="Ejemplo: correo@gmail.com">

            <label for="telefono">Teléfono:</label>
            <input type="text" id="telefono" maxlength="10" placeholder="Ejemplo: 9513571146">

            <label for="codigoPostal">Código postal:</label>
            <input type="text" id="codigoPostal" maxlength="5" placeholder="Ejemplo: 68000">

            <label for="fechaNacimiento">Fecha de nacimiento:</label>
            <input type="date" id="fechaNacimiento">

            <p id="mensaje"></p>

            <button type="submit">Validar formulario</button>
        </form>

        <a href="./login.html">Ir al login</a>
    </div>

    <div id="modal" class="modal">
        <div class="contenido-modal">
            <h2>Edad calculada</h2>
            <p id="edadTexto"></p>
            <button id="cerrarModal">Cerrar</button>
        </div>
    </div>
    
<script src="./js/utileria.js"></script>
<script src="./js/validacion.js"></script>

    

</body>
</html>
